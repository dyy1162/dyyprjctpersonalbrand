3 lantai dengan 50+ endpoint, termasuk konfigurasi router, switch managed, dan access point.",overview:`Proyek ini mencakup perencanaan dan implementasi infrastruktur jaringan lengkap untuk kantor baru PT. Mitra Sejahtera. Dimulai dari survey lokasi, desain topologi jaringan, pemasangan kabel UTP Cat6, instalasi rack server, konfigurasi VLAN untuk setiap departemen, hingga optimalisasi coverage WiFi di seluruh area kantor.

Tantangan utama adalah memastikan coverage WiFi merata di 3 lantai dengan struktur bangunan yang memiliki dinding beton tebal. Solusinya menggunakan access point dengan fitur mesh networking dan penempatan strategis berdasarkan hasil site survey.
